address_bits        = 32

[L1]
level               = "L1"
cycles              = 1
sets_in_cache       = 64          # 32KB / (8-way * 64B)
blocks_per_set      = 8           # 8-way associative
bytes_per_block     = 64
write_allocate      = true
write_through       = false       # Write-back
eviction            = "LRU"

[L2]
level               = "L2"
cycles              = 4
sets_in_cache       = 1024        # 512KB / (8-way * 64B)
blocks_per_set      = 8           # 8-way associative
bytes_per_block     = 64
write_allocate      = true
write_through       = false       # Write-back
eviction            = "LRU"

